name: Build APK & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Generate version tag
        id: version
        run: |
          VERSION="v1.0.$(date +%Y%m%d%H%M%S)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            release-artifacts/LucknowWaterBowl-${{ steps.version.outputs.version }}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
              release-artifacts/LucknowWaterBowl-${{ steps.version.outputs.version }}-release.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Water Bowl Drive ${{ steps.version.outputs.version }}"
          body: |
            ## Lucknow Water Bowl Drive - Android

            **Built on:** ${{ steps.version.outputs.date }}
            **Commit:** ${{ github.sha }}

            ### What's included
            - Dashboard with distribution statistics
            - Drive management (create, view, detail)
            - Record distribution with camera & GPS
            - Route planner with geocoding & optimization
            - Photo gallery

            ### Install
            Download the APK below and install on your Android device.
            You may need to enable "Install from unknown sources" in settings.
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
